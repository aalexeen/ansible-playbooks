---
# 6_rollback — emergency rollback to local authentication
#
# Called from the rescue block in migrate.yml when any migration step fails.
# Reconnects using LOCAL credentials (safety session) to undo all AAA changes.
# Overriding ansible_user/ansible_password forces network_cli to open a NEW
# connection with local auth, bypassing any TACACS+ auth that may be active.
#
# ios_command is used (not ios_config) to avoid implicit show running-config
# calls — speed and reliability are critical during rollback.
#
# Command order within each block is intentional:
#   1. no aaa authorization config-commands  — removes TACACS+ dependency for config cmds
#   2. no aaa authorization commands X       — removes command authz
#   3. aaa authentication login default local — now applies without TACACS+ authz check
#   4. aaa authorization exec default local   — restore exec authz to local

- name: "ROLLBACK | Resetting to local-auth connection"
  meta: reset_connection
  vars:
    ansible_user: "{{ local_user }}"
    ansible_password: "{{ local_pass }}"
    ansible_become_pass: "{{ local_enable | default('') }}"

- name: "ROLLBACK | Restore local AAA — single atomic block"
  cisco.ios.ios_command:
    commands:
      - configure terminal
      - no aaa authorization config-commands
      - no aaa authorization commands 0  default
      - no aaa authorization commands 1  default
      - no aaa authorization commands 5  default
      - no aaa authorization commands 15 default
      - aaa authentication login default local
      - aaa authorization exec default local
      - end
  vars:
    ansible_user: "{{ local_user }}"
    ansible_password: "{{ local_pass }}"
    ansible_become_pass: "{{ local_enable | default('') }}"
  ignore_errors: true

- name: "ROLLBACK | Removing TACACS+ server config (IOS XE 16)"
  cisco.ios.ios_command:
    commands: >-
      {{
        ['configure terminal',
         'no aaa group server tacacs+ ' + tacacs_server_group,
         'no tacacs server TACACS-PRIMARY']
        + (['no tacacs server TACACS-SECONDARY']
           if tacacs_server_secondary | default('') != '' else [])
        + ['end']
      }}
  vars:
    ansible_user: "{{ local_user }}"
    ansible_password: "{{ local_pass }}"
    ansible_become_pass: "{{ local_enable | default('') }}"
  when: ios_version | int == 16
  ignore_errors: true

- name: "ROLLBACK | Removing TACACS+ server config (IOS 12)"
  cisco.ios.ios_command:
    commands: >-
      {{
        ['configure terminal',
         'no tacacs-server host ' + tacacs_server_primary]
        + (['no tacacs-server host ' + tacacs_server_secondary]
           if tacacs_server_secondary | default('') != '' else [])
        + ['end']
      }}
  vars:
    ansible_user: "{{ local_user }}"
    ansible_password: "{{ local_pass }}"
    ansible_become_pass: "{{ local_enable | default('') }}"
  when: ios_version | int == 12
  ignore_errors: true

- name: "ROLLBACK | Saving after rollback"
  cisco.ios.ios_command:
    commands:
      - write memory
  vars:
    ansible_user: "{{ local_user }}"
    ansible_password: "{{ local_pass }}"
    ansible_become_pass: "{{ local_enable | default('') }}"
  ignore_errors: true

- name: "ROLLBACK | Marking host as failed"
  fail:
    msg: "Migration FAILED on {{ inventory_hostname }} — rollback applied. Check output above."
