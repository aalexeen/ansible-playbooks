---
# 5_finalize — switch command authorization to TACACS+, configure accounting, save
#
# connection_mode=ssh    → cisco.ios.ios_command + meta: reset_connection for verify
# connection_mode=telnet → uri → broker /telnet-session/{work_session_id}/exec
#
# Branch legacy: references built-in group tacacs+
# Branch modern (16+): references named group (tacacs_server_group)
#
# Failsafe levels:
#   0, 1: if-authenticated  → exit/logout work even if TACACS+ down
#   5:    none              → show/conf t work when TACACS+ down (engineer fallback)
#   15:   (no fallback)     → reload/erase blocked when TACACS+ down

# ── Step 6: Switch command authorization to TACACS+ ────────────────────────

- name: "FINALIZE | Apply TACACS+ command authorization (legacy, SSH)"
  cisco.ios.ios_command:
    commands:
      - configure terminal
      - aaa new-model
      - aaa authorization commands 0  default group tacacs+ if-authenticated
      - aaa authorization commands 1  default group tacacs+ if-authenticated
      - aaa authorization commands 5  default group tacacs+ none
      - aaa authorization commands 15 default group tacacs+
      - end
  when:
    - connection_mode | default('ssh') == 'ssh'
    - ios_branch == 'legacy'

- name: "FINALIZE | Apply TACACS+ command authorization (modern 16+, SSH)"
  cisco.ios.ios_command:
    commands:
      - configure terminal
      - aaa new-model
      - "aaa authorization commands 0  default group {{ tacacs_server_group }} if-authenticated"
      - "aaa authorization commands 1  default group {{ tacacs_server_group }} if-authenticated"
      - "aaa authorization commands 5  default group {{ tacacs_server_group }} none"
      - "aaa authorization commands 15 default group {{ tacacs_server_group }}"
      - end
  when:
    - connection_mode | default('ssh') == 'ssh'
    - ios_branch == 'modern'

- name: "FINALIZE | Apply TACACS+ command authorization (legacy, Telnet)"
  ansible.builtin.uri:
    url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
    method: POST
    body_format: json
    body:
      commands:
        - configure terminal
        - aaa new-model
        - aaa authorization commands 0  default group tacacs+ if-authenticated
        - aaa authorization commands 1  default group tacacs+ if-authenticated
        - aaa authorization commands 5  default group tacacs+ none
        - aaa authorization commands 15 default group tacacs+
        - end
    headers:
      X-API-Token: "{{ broker_token }}"
    status_code: 200
    timeout: 30
  delegate_to: localhost
  when:
    - connection_mode | default('ssh') == 'telnet'
    - ios_branch == 'legacy'

- name: "FINALIZE | Apply TACACS+ command authorization (modern 16+, Telnet)"
  ansible.builtin.uri:
    url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
    method: POST
    body_format: json
    body:
      commands:
        - configure terminal
        - aaa new-model
        - "aaa authorization commands 0  default group {{ tacacs_server_group }} if-authenticated"
        - "aaa authorization commands 1  default group {{ tacacs_server_group }} if-authenticated"
        - "aaa authorization commands 5  default group {{ tacacs_server_group }} none"
        - "aaa authorization commands 15 default group {{ tacacs_server_group }}"
        - end
    headers:
      X-API-Token: "{{ broker_token }}"
    status_code: 200
    timeout: 30
  delegate_to: localhost
  when:
    - connection_mode | default('ssh') == 'telnet'
    - ios_branch == 'modern'

# ── Step 7: Accounting ─────────────────────────────────────────────────────

- name: "FINALIZE | Configure accounting (legacy, SSH)"
  cisco.ios.ios_command:
    commands:
      - configure terminal
      - aaa accounting exec default start-stop group tacacs+
      - aaa accounting commands 0  default start-stop group tacacs+
      - aaa accounting commands 1  default start-stop group tacacs+
      - aaa accounting commands 5  default start-stop group tacacs+
      - aaa accounting commands 15 default start-stop group tacacs+
      - end
  when:
    - connection_mode | default('ssh') == 'ssh'
    - ios_branch == 'legacy'

- name: "FINALIZE | Configure accounting (modern 16+, SSH)"
  cisco.ios.ios_command:
    commands:
      - configure terminal
      - "aaa accounting exec default start-stop group {{ tacacs_server_group }}"
      - "aaa accounting commands 0  default start-stop group {{ tacacs_server_group }}"
      - "aaa accounting commands 1  default start-stop group {{ tacacs_server_group }}"
      - "aaa accounting commands 5  default start-stop group {{ tacacs_server_group }}"
      - "aaa accounting commands 15 default start-stop group {{ tacacs_server_group }}"
      - end
  when:
    - connection_mode | default('ssh') == 'ssh'
    - ios_branch == 'modern'

- name: "FINALIZE | Configure accounting (legacy, Telnet)"
  ansible.builtin.uri:
    url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
    method: POST
    body_format: json
    body:
      commands:
        - configure terminal
        - aaa accounting exec default start-stop group tacacs+
        - aaa accounting commands 0  default start-stop group tacacs+
        - aaa accounting commands 1  default start-stop group tacacs+
        - aaa accounting commands 5  default start-stop group tacacs+
        - aaa accounting commands 15 default start-stop group tacacs+
        - end
    headers:
      X-API-Token: "{{ broker_token }}"
    status_code: 200
    timeout: 30
  delegate_to: localhost
  when:
    - connection_mode | default('ssh') == 'telnet'
    - ios_branch == 'legacy'

- name: "FINALIZE | Configure accounting (modern 16+, Telnet)"
  ansible.builtin.uri:
    url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
    method: POST
    body_format: json
    body:
      commands:
        - configure terminal
        - "aaa accounting exec default start-stop group {{ tacacs_server_group }}"
        - "aaa accounting commands 0  default start-stop group {{ tacacs_server_group }}"
        - "aaa accounting commands 1  default start-stop group {{ tacacs_server_group }}"
        - "aaa accounting commands 5  default start-stop group {{ tacacs_server_group }}"
        - "aaa accounting commands 15 default start-stop group {{ tacacs_server_group }}"
        - end
    headers:
      X-API-Token: "{{ broker_token }}"
    status_code: 200
    timeout: 30
  delegate_to: localhost
  when:
    - connection_mode | default('ssh') == 'telnet'
    - ios_branch == 'modern'

- name: "FINALIZE | Verify accounting config is present (SSH)"
  cisco.ios.ios_command:
    commands:
      - show running-config | include aaa accounting
  register: acct_check_ssh
  when: connection_mode | default('ssh') == 'ssh'

- name: "FINALIZE | Verify accounting config is present (Telnet)"
  ansible.builtin.uri:
    url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
    method: POST
    body_format: json
    body:
      commands:
        - show running-config | include aaa accounting
    headers:
      X-API-Token: "{{ broker_token }}"
    status_code: 200
    timeout: 30
  register: acct_check_telnet
  delegate_to: localhost
  when: connection_mode | default('ssh') == 'telnet'

- name: "FINALIZE | Normalize accounting check output"
  set_fact:
    _acct_text: >-
      {{ acct_check_ssh.stdout[0]
         if connection_mode | default('ssh') == 'ssh'
         else acct_check_telnet.json.outputs['show running-config | include aaa accounting'] }}

- name: "FINALIZE | Assert accounting exec and commands are configured"
  assert:
    that:
      - "'accounting exec default' in _acct_text"
      - "'accounting commands' in _acct_text"
    fail_msg: "Accounting lines not found in running-config after applying"

# ── Step 8: Full AAA verification ──────────────────────────────────────────

- name: "FINALIZE | Reset connection for full AAA verification (SSH)"
  meta: reset_connection
  when: connection_mode | default('ssh') == 'ssh'

- name: "FINALIZE | Verify full AAA — reconnect as admin via TACACS+ (SSH)"
  cisco.ios.ios_command:
    commands:
      - show privilege
  register: final_verify_ssh
  vars:
    ansible_user: "{{ local_user }}"
    ansible_password: "{{ local_pass }}"
    ansible_become_pass: "{{ local_enable | default('') }}"
  when: connection_mode | default('ssh') == 'ssh'

- name: "FINALIZE | Assert admin TACACS+ session is functional (SSH)"
  assert:
    that:
      - final_verify_ssh.stdout[0] is defined
      - final_verify_ssh is not failed
    fail_msg: >
      Full AAA verification failed — admin session could not reconnect via TACACS+.
      Config will NOT be saved. Output: {{ final_verify_ssh.stdout[0] | default('no output') }}
  when: connection_mode | default('ssh') == 'ssh'

- name: "FINALIZE | Reset connection back to main credentials (SSH)"
  meta: reset_connection
  when: connection_mode | default('ssh') == 'ssh'

- name: "FINALIZE | Verify full AAA config is complete (Telnet)"
  ansible.builtin.uri:
    url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
    method: POST
    body_format: json
    body:
      commands:
        - show running-config | include aaa
    headers:
      X-API-Token: "{{ broker_token }}"
    status_code: 200
    timeout: 30
  register: final_verify_telnet
  delegate_to: localhost
  when: connection_mode | default('ssh') == 'telnet'

- name: "FINALIZE | Assert full AAA config is complete (Telnet)"
  assert:
    that:
      - "'authentication login' in (final_verify_telnet.json.outputs['show running-config | include aaa'] | lower)"
      - "'accounting exec' in (final_verify_telnet.json.outputs['show running-config | include aaa'] | lower)"
      - "'authorization commands' in (final_verify_telnet.json.outputs['show running-config | include aaa'] | lower)"
    fail_msg: >
      Full AAA verification failed — expected aaa lines not found in running-config.
      Config will NOT be saved.
      Output: {{ final_verify_telnet.json.outputs['show running-config | include aaa'] }}
  when: connection_mode | default('ssh') == 'telnet'

# ── Step 9: Save ───────────────────────────────────────────────────────────

- name: "FINALIZE | Save configuration (write memory, SSH)"
  cisco.ios.ios_command:
    commands:
      - write memory
  register: save_result_ssh
  when: connection_mode | default('ssh') == 'ssh'

- name: "FINALIZE | Save configuration (write memory, Telnet)"
  ansible.builtin.uri:
    url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
    method: POST
    body_format: json
    body:
      commands:
        - write memory
    headers:
      X-API-Token: "{{ broker_token }}"
    status_code: 200
    timeout: 60
  register: save_result_telnet
  delegate_to: localhost
  when: connection_mode | default('ssh') == 'telnet'

- name: "FINALIZE | Normalize save output"
  set_fact:
    _save_text: >-
      {{ save_result_ssh.stdout[0]
         if connection_mode | default('ssh') == 'ssh'
         else save_result_telnet.json.outputs['write memory'] }}

- name: "FINALIZE | Assert config was saved"
  assert:
    that:
      - >
        'ok' in (_save_text | lower)
        or '[ok]' in (_save_text | lower)
        or 'building' in (_save_text | lower)
    fail_msg: "Config save may have failed. Output: {{ _save_text }}"

- name: "FINALIZE | Migration complete"
  debug:
    msg: >
      ══════════════════════════════════════════
      Migration SUCCEEDED: {{ inventory_hostname }}
      IOS version: {{ ios_major }}.{{ ios_minor }} (branch: {{ ios_branch }})
      Connection: {{ connection_mode | default('ssh') }}
      TACACS+ servers: {{ tacacs_server_primary }}{{ ', ' + tacacs_server_secondary if tacacs_server_secondary | default('') != '' else '' }}
      ══════════════════════════════════════════
