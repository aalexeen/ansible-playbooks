---
# 4_switch — switch authentication and exec authorization to TACACS+
#
# CRITICAL STEP — after this, new connections authenticate via TACACS+.
#
# connection_mode=ssh:
#   Uses cisco.ios.ios_command. After switching, meta: reset_connection
#   re-authenticates via TACACS+ to verify the new config works.
#
# connection_mode=telnet:
#   Uses uri → broker work_session. reset_connection is not available for
#   Telnet; verification is done via show privilege on the existing session
#   (the session was authenticated with local creds and survives AAA changes).
#
# Branch legacy: references built-in group tacacs+
# Branch modern (16+): references named group (tacacs_server_group)

- name: "SWITCH | Switch authentication to TACACS+ (legacy, SSH)"
  cisco.ios.ios_command:
    commands:
      - configure terminal
      - aaa new-model
      - aaa authentication login default group tacacs+ local
      - aaa authorization exec default group tacacs+ local if-authenticated
      - end
  when:
    - connection_mode | default('ssh') == 'ssh'
    - ios_branch == 'legacy'

- name: "SWITCH | Switch authentication to TACACS+ (modern 16+, SSH)"
  cisco.ios.ios_command:
    commands:
      - configure terminal
      - aaa new-model
      - "aaa authentication login default group {{ tacacs_server_group }} local"
      - "aaa authorization exec default group {{ tacacs_server_group }} local if-authenticated"
      - aaa authorization config-commands
      - end
  when:
    - connection_mode | default('ssh') == 'ssh'
    - ios_branch == 'modern'

- name: "SWITCH | Switch authentication to TACACS+ (legacy, Telnet)"
  ansible.builtin.uri:
    url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
    method: POST
    body_format: json
    body:
      commands:
        - configure terminal
        - aaa new-model
        - aaa authentication login default group tacacs+ local
        - aaa authorization exec default group tacacs+ local if-authenticated
        - end
    headers:
      X-API-Token: "{{ broker_token }}"
    status_code: 200
    timeout: 30
  delegate_to: localhost
  when:
    - connection_mode | default('ssh') == 'telnet'
    - ios_branch == 'legacy'

- name: "SWITCH | Switch authentication to TACACS+ (modern 16+, Telnet)"
  ansible.builtin.uri:
    url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
    method: POST
    body_format: json
    body:
      commands:
        - configure terminal
        - aaa new-model
        - "aaa authentication login default group {{ tacacs_server_group }} local"
        - "aaa authorization exec default group {{ tacacs_server_group }} local if-authenticated"
        - aaa authorization config-commands
        - end
    headers:
      X-API-Token: "{{ broker_token }}"
    status_code: 200
    timeout: 30
  delegate_to: localhost
  when:
    - connection_mode | default('ssh') == 'telnet'
    - ios_branch == 'modern'

# ── SSH path: reconnect as TACACS+ test user to verify ────────────────────

- name: "SWITCH | Reset connection to force re-authentication (SSH)"
  meta: reset_connection
  when: connection_mode | default('ssh') == 'ssh'

- name: "SWITCH | Verify TACACS+ auth — reconnect as TACACS+ test user (SSH)"
  cisco.ios.ios_command:
    commands:
      - show privilege
  register: tacacs_verify_ssh
  vars:
    ansible_user: "{{ tacacs_test_user }}"
    ansible_password: "{{ tacacs_test_pass }}"
  when: connection_mode | default('ssh') == 'ssh'

- name: "SWITCH | Assert TACACS+ authentication is functional (SSH)"
  assert:
    that:
      - tacacs_verify_ssh.stdout[0] is defined
      - tacacs_verify_ssh is not failed
    fail_msg: >
      TACACS+ auth session failed — could not reconnect as test user.
      Output: {{ tacacs_verify_ssh.stdout[0] | default('no output') }}
  when: connection_mode | default('ssh') == 'ssh'

- name: "SWITCH | Reset connection back to main credentials (SSH)"
  meta: reset_connection
  when: connection_mode | default('ssh') == 'ssh'

# ── Telnet path: verify via existing work session ─────────────────────────
# The work session was authenticated with local creds and stays alive through
# the AAA change. We verify TACACS+ reachability by checking show privilege
# (session still works) and that the aaa authentication line is in running-config.

- name: "SWITCH | Verify TACACS+ config is in running-config (Telnet)"
  ansible.builtin.uri:
    url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
    method: POST
    body_format: json
    body:
      commands:
        - show running-config | include aaa authentication login
    headers:
      X-API-Token: "{{ broker_token }}"
    status_code: 200
    timeout: 30
  register: tacacs_verify_telnet
  delegate_to: localhost
  when: connection_mode | default('ssh') == 'telnet'

- name: "SWITCH | Assert TACACS+ authentication config is present (Telnet)"
  assert:
    that:
      - "'tacacs' in (tacacs_verify_telnet.json.outputs['show running-config | include aaa authentication login'] | lower)"
    fail_msg: >
      TACACS+ auth config not found in running-config after switching.
      Output: {{ tacacs_verify_telnet.json.outputs['show running-config | include aaa authentication login'] }}
  when: connection_mode | default('ssh') == 'telnet'
