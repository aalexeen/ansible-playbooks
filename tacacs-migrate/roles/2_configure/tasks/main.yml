# ── TACACS+ reachability test ──────────────────────────────────────────────

- name: "CONFIGURE | Verify TACACS+ reachability (legacy, SSH)"
  cisco.ios.ios_command:
    commands:
      - "test aaa group tacacs+ {{ tacacs_test_user }} {{ tacacs_test_pass }} legacy"
  register: aaa_test_legacy_ssh
  when:
    - connection_mode | default('ssh') == 'ssh'
    - ios_branch == 'legacy'

- name: "CONFIGURE | Verify TACACS+ reachability (modern, SSH)"
  cisco.ios.ios_command:
    commands:
      - "test aaa group {{ tacacs_server_group }} {{ tacacs_test_user }} {{ tacacs_test_pass }} new-code"
  register: aaa_test_modern_ssh
  when:
    - connection_mode | default('ssh') == 'ssh'
    - ios_branch == 'modern'

- name: "CONFIGURE | Verify TACACS+ reachability (legacy, Telnet)"
  ansible.builtin.uri:
    url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
    method: POST
    body_format: json
    body:
      commands:
        - "test aaa group tacacs+ {{ tacacs_test_user }} {{ tacacs_test_pass }} legacy"
    headers:
      X-API-Token: "{{ broker_token }}"
    status_code: 200
    timeout: 90
  register: aaa_test_legacy_telnet
  delegate_to: localhost
  when:
    - connection_mode | default('ssh') == 'telnet'
    - ios_branch == 'legacy'

- name: "CONFIGURE | Verify TACACS+ reachability (modern, Telnet)"
  ansible.builtin.uri:
    url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
    method: POST
    body_format: json
    body:
      commands:
        - "test aaa group {{ tacacs_server_group }} {{ tacacs_test_user }} {{ tacacs_test_pass }} new-code"
    headers:
      X-API-Token: "{{ broker_token }}"
    status_code: 200
    timeout: 90
  register: aaa_test_modern_telnet
  delegate_to: localhost
  when:
    - connection_mode | default('ssh') == 'telnet'
    - ios_branch == 'modern'

# Some legacy IOS versions do not accept the 'legacy' keyword in 'test aaa' —
# they report '% Invalid input'. In that case retry without the keyword.

- name: "CONFIGURE | Retry AAA test without 'legacy' keyword (legacy, Telnet)"
  ansible.builtin.uri:
    url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
    method: POST
    body_format: json
    body:
      commands:
        - "test aaa group tacacs+ {{ tacacs_test_user }} {{ tacacs_test_pass }}"
    headers:
      X-API-Token: "{{ broker_token }}"
    status_code: 200
    timeout: 90
  register: aaa_test_legacy_telnet_nw
  delegate_to: localhost
  when:
    - connection_mode | default('ssh') == 'telnet'
    - ios_branch == 'legacy'
    - "'% Invalid input' in (aaa_test_legacy_telnet.json.outputs['test aaa group tacacs+ ' + tacacs_test_user + ' ' + tacacs_test_pass + ' legacy'] | default(''))"

- name: "CONFIGURE | Retry AAA test without 'legacy' keyword (legacy, SSH)"
  cisco.ios.ios_command:
    commands:
      - "test aaa group tacacs+ {{ tacacs_test_user }} {{ tacacs_test_pass }}"
  register: aaa_test_legacy_ssh_nw
  when:
    - connection_mode | default('ssh') == 'ssh'
    - ios_branch == 'legacy'
    - "'% Invalid input' in (aaa_test_legacy_ssh.stdout[0] | default(''))"

# Fix for audit issue #3: extract output immediately while key is statically known,
# instead of building dict key via string concatenation in a later set_fact.

- name: "CONFIGURE | Extract AAA test output (legacy, Telnet)"
  set_fact:
    _aaa_test_telnet_text: >-
      {%- set out_legacy = aaa_test_legacy_telnet.json.outputs['test aaa group tacacs+ ' + tacacs_test_user + ' ' + tacacs_test_pass + ' legacy'] | default('') -%}
      {%- if '% Invalid input' in out_legacy -%}
        {{ aaa_test_legacy_telnet_nw.json.outputs['test aaa group tacacs+ ' + tacacs_test_user + ' ' + tacacs_test_pass] | default('') }}
      {%- else -%}
        {{ out_legacy }}
      {%- endif -%}
  when:
    - connection_mode | default('ssh') == 'telnet'
    - ios_branch == 'legacy'

- name: "CONFIGURE | Extract AAA test output (modern, Telnet)"
  set_fact:
    _aaa_test_telnet_text: "{{ aaa_test_modern_telnet.json.outputs['test aaa group ' + tacacs_server_group + ' ' + tacacs_test_user + ' ' + tacacs_test_pass + ' new-code'] }}"
  when:
    - connection_mode | default('ssh') == 'telnet'
    - ios_branch == 'modern'

- name: "CONFIGURE | Normalize AAA test output"
  set_fact:
    _aaa_test_text: >-
      {%- if connection_mode | default('ssh') == 'ssh' and ios_branch == 'legacy' -%}
        {%- set out = aaa_test_legacy_ssh.stdout[0] | default('') -%}
        {{ aaa_test_legacy_ssh_nw.stdout[0] if ('% Invalid input' in out and aaa_test_legacy_ssh_nw is not skipped) else out }}
      {%- elif connection_mode | default('ssh') == 'ssh' and ios_branch == 'modern' -%}
        {{ aaa_test_modern_ssh.stdout[0] | default('') }}
      {%- else -%}
        {{ _aaa_test_telnet_text }}
      {%- endif -%}

- name: "CONFIGURE | Assert TACACS+ authentication succeeded"
  assert:
    that:
      - "'successfully authenticated' in (_aaa_test_text | lower)"
    fail_msg: >
      TACACS+ server did not respond or authentication failed.
      Output: {{ _aaa_test_text }}

# ── Step 2: VTY privilege level ────────────────────────────────────────────

- name: "CONFIGURE | Set privilege level 15 on VTY lines (SSH)"
  cisco.ios.ios_command:
    commands:
      - configure terminal
      - line vty 0 4
      - "  privilege level 15"
      - line vty 5 15
      - "  privilege level 15"
      - end
  when: connection_mode | default('ssh') == 'ssh'

- name: "CONFIGURE | Set privilege level 15 on VTY lines (Telnet)"
  ansible.builtin.uri:
    url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
    method: POST
    body_format: json
    body:
      commands:
        - configure terminal
        - line vty 0 4
        - "  privilege level 15"
        - line vty 5 15
        - "  privilege level 15"
        - end
    headers:
      X-API-Token: "{{ broker_token }}"
    status_code: 200
    timeout: 30
  delegate_to: localhost
  when: connection_mode | default('ssh') == 'telnet'
