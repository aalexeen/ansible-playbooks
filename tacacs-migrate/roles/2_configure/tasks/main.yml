          X-API-Token: "{{ broker_token }}"
        status_code: 200
        timeout: 30
      delegate_to: localhost
  rescue:
    - name: "CONFIGURE | Fallback — separate host/key syntax (legacy, 2 servers, Telnet)"
      ansible.builtin.uri:
        url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
        method: POST
        body_format: json
        body:
