---
# 2_configure — configure TACACS+ server(s) and set VTY privilege level
#
# connection_mode=ssh    → cisco.ios.ios_command
# connection_mode=telnet → uri → broker /telnet-session/{work_session_id}/exec
#
# Branch legacy (ios_major <= 15), two sub-variants:
#   normal:   tacacs-server host <IP> key <key>  (per-host key)
#   old:      tacacs-server host <IP>             (host only)
#             tacacs-server key <key>             (global key, separate command)
#   The normal variant is attempted first; if IOS rejects it (Invalid input),
#   the old variant is applied automatically via rescue block.
#   Host fact legacy_old_syntax=true is set after fallback for logging.
#
# Branch modern (ios_major >= 16):
#   tacacs server <name> (named object, no dash)
#
# Supports 1 or 2 servers (tacacs_server_secondary optional).

# ── Step 1: TACACS+ servers ────────────────────────────────────────────────

# ── Legacy, SSH ───────────────────────────────────────────────────────────

- name: "CONFIGURE | Configure TACACS+ server(s) (legacy, 1 server, SSH)"
  when:
    - connection_mode | default('ssh') == 'ssh'
    - ios_branch == 'legacy'
    - tacacs_server_secondary | default('') == ''
  block:
    - name: "CONFIGURE | Try host+key syntax (legacy, 1 server, SSH)"
      cisco.ios.ios_command:
        commands:
          - configure terminal
          - "tacacs-server host {{ tacacs_server_primary }} key {{ tacacs_key }}"
          - "tacacs-server timeout {{ tacacs_timeout }}"
          - end
  rescue:
    - name: "CONFIGURE | Fallback — separate host/key syntax (legacy, 1 server, SSH)"
      cisco.ios.ios_command:
        commands:
          - configure terminal
          - "tacacs-server host {{ tacacs_server_primary }}"
          - "tacacs-server key {{ tacacs_key }}"
          - "tacacs-server timeout {{ tacacs_timeout }}"
          - end
    - name: "CONFIGURE | Mark legacy old syntax used"
      set_fact:
        legacy_old_syntax: true

- name: "CONFIGURE | Configure TACACS+ server(s) (legacy, 2 servers, SSH)"
  when:
    - connection_mode | default('ssh') == 'ssh'
    - ios_branch == 'legacy'
    - tacacs_server_secondary | default('') != ''
  block:
    - name: "CONFIGURE | Try host+key syntax (legacy, 2 servers, SSH)"
      cisco.ios.ios_command:
        commands:
          - configure terminal
          - "tacacs-server host {{ tacacs_server_primary }} key {{ tacacs_key }}"
          - "tacacs-server host {{ tacacs_server_secondary }} key {{ tacacs_key }}"
          - "tacacs-server timeout {{ tacacs_timeout }}"
          - end
  rescue:
    - name: "CONFIGURE | Fallback — separate host/key syntax (legacy, 2 servers, SSH)"
      cisco.ios.ios_command:
        commands:
          - configure terminal
          - "tacacs-server host {{ tacacs_server_primary }}"
          - "tacacs-server host {{ tacacs_server_secondary }}"
          - "tacacs-server key {{ tacacs_key }}"
          - "tacacs-server timeout {{ tacacs_timeout }}"
          - end
    - name: "CONFIGURE | Mark legacy old syntax used"
      set_fact:
        legacy_old_syntax: true

# ── Modern, SSH ───────────────────────────────────────────────────────────
# If the device rejects 'tacacs server' syntax (reports Invalid input),
# it is actually a legacy IOS device misidentified as modern.
# Rescue falls back to legacy_old syntax and sets ios_branch=legacy so that
# all subsequent roles (3, 4, 5) also follow the legacy path.

- name: "CONFIGURE | Configure TACACS+ server(s) and group (modern 16+, 1 server, SSH)"
  when:
    - connection_mode | default('ssh') == 'ssh'
    - ios_branch == 'modern'
    - tacacs_server_secondary | default('') == ''
  block:
    - name: "CONFIGURE | Try modern syntax (1 server, SSH)"
      cisco.ios.ios_command:
        commands:
          - configure terminal
          - tacacs server TACACS-PRIMARY
          - "  address ipv4 {{ tacacs_server_primary }}"
          - "  key {{ tacacs_key }}"
          - "  timeout {{ tacacs_timeout }}"
          - exit
          - "aaa group server tacacs+ {{ tacacs_server_group }}"
          - "  server name TACACS-PRIMARY"
          - end
  rescue:
    - name: "CONFIGURE | Fallback — legacy_old syntax (1 server, SSH)"
      cisco.ios.ios_command:
        commands:
          - configure terminal
          - "tacacs-server host {{ tacacs_server_primary }}"
          - "tacacs-server key {{ tacacs_key }}"
          - "tacacs-server timeout {{ tacacs_timeout }}"
          - end
    - name: "CONFIGURE | Downgrade ios_branch to legacy (modern syntax rejected)"
      set_fact:
        ios_branch: "legacy"
        legacy_old_syntax: true

- name: "CONFIGURE | Configure TACACS+ server(s) and group (modern 16+, 2 servers, SSH)"
  when:
    - connection_mode | default('ssh') == 'ssh'
    - ios_branch == 'modern'
    - tacacs_server_secondary | default('') != ''
  block:
    - name: "CONFIGURE | Try modern syntax (2 servers, SSH)"
      cisco.ios.ios_command:
        commands:
          - configure terminal
          - tacacs server TACACS-PRIMARY
          - "  address ipv4 {{ tacacs_server_primary }}"
          - "  key {{ tacacs_key }}"
          - "  timeout {{ tacacs_timeout }}"
          - exit
          - tacacs server TACACS-SECONDARY
          - "  address ipv4 {{ tacacs_server_secondary }}"
          - "  key {{ tacacs_key }}"
          - "  timeout {{ tacacs_timeout }}"
          - exit
          - "aaa group server tacacs+ {{ tacacs_server_group }}"
          - "  server name TACACS-PRIMARY"
          - "  server name TACACS-SECONDARY"
          - end
  rescue:
    - name: "CONFIGURE | Fallback — legacy_old syntax (2 servers, SSH)"
      cisco.ios.ios_command:
        commands:
          - configure terminal
          - "tacacs-server host {{ tacacs_server_primary }}"
          - "tacacs-server host {{ tacacs_server_secondary }}"
          - "tacacs-server key {{ tacacs_key }}"
          - "tacacs-server timeout {{ tacacs_timeout }}"
          - end
    - name: "CONFIGURE | Downgrade ios_branch to legacy (modern syntax rejected)"
      set_fact:
        ios_branch: "legacy"
        legacy_old_syntax: true

# ── Legacy, Telnet ────────────────────────────────────────────────────────

- name: "CONFIGURE | Configure TACACS+ server(s) (legacy, 1 server, Telnet)"
  when:
    - connection_mode | default('ssh') == 'telnet'
    - ios_branch == 'legacy'
    - tacacs_server_secondary | default('') == ''
  block:
    - name: "CONFIGURE | Try host+key syntax (legacy, 1 server, Telnet)"
      ansible.builtin.uri:
        url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
        method: POST
        body_format: json
        body:
          commands:
            - configure terminal
            - "tacacs-server host {{ tacacs_server_primary }} key {{ tacacs_key }}"
            - "tacacs-server timeout {{ tacacs_timeout }}"
            - end
        headers:
          X-API-Token: "{{ broker_token }}"
        status_code: 200
        timeout: 30
      delegate_to: localhost
  rescue:
    - name: "CONFIGURE | Fallback — separate host/key syntax (legacy, 1 server, Telnet)"
      ansible.builtin.uri:
        url: "{{ broker_url }}/telnet-session/{{ work_session_id }}/exec"
        method: POST
        body_format: json
        body:
          commands:
            - configure terminal
            - "tacacs-server host {{ tacacs_server_primary }}"
            - "tacacs-server key {{ tacacs_key }}"
            - "tacacs-server timeout {{ tacacs_timeout }}"
            - end
        headers:
          X-API-Token: "{{ broker_token }}"
        status_code: 200
        timeout: 30
      delegate_to: localhost
    - name: "CONFIGURE | Mark legacy old syntax used"
      set_fact:
        legacy_old_syntax: true

